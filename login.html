<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeVault — Login</title>
  <link rel="icon" href="/pfp.jpeg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-box">
    <div class="auth-logo">
      <img src="/pfp.jpeg" alt="PokeVault Logo" class="auth-logo-img" />
    </div>
    <h1 class="auth-title">PokeVault</h1>
    <p class="auth-subtitle">Track your Pokémon collection in SGD</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Log in</button>
      <button class="auth-tab"        onclick="showTab('register')">Register</button>
    </div>

    <div id="tab-login">
      <form onsubmit="event.preventDefault(); login()">
        <div class="form-group">
          <label>Username</label>
          <input type="text"     id="login-user" placeholder="Your username" autocomplete="username" />
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Your password" autocomplete="current-password" />
        </div>
        <p class="auth-error" id="login-error"></p>
        <button type="submit" class="btn-primary full-width" style="margin-top:8px;">Log in</button>
      </form>
    </div>

    <div id="tab-register" style="display:none;">
      <form onsubmit="event.preventDefault(); register()">
        <div class="form-group">
          <label>Username</label>
          <input type="text"     id="reg-user" placeholder="Choose a username" autocomplete="username" />
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Choose a password (min 6 chars)" autocomplete="new-password" />
        </div>
        <p class="auth-error" id="reg-error"></p>
        <button type="submit" class="btn-primary full-width" style="margin-top:8px;">Create account</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const saved = localStorage.getItem('pv-theme') || 'dark';
      // Migrate dark2 → dark
      document.documentElement.setAttribute('data-theme', saved === 'dark2' ? 'dark' : saved);
    })();

    function showTab(tab) {
      document.getElementById('tab-login').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
    }

    async function login() {
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;
      const errEl    = document.getElementById('login-error');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Please fill in both fields.'; return; }
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }
      window.location.href = '/';
    }

    async function register() {
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      const errEl    = document.getElementById('reg-error');
      errEl.textContent = '';
      if (!username || !password)  { errEl.textContent = 'Please fill in both fields.'; return; }
      if (password.length < 6)     { errEl.textContent = 'Password must be at least 6 characters.'; return; }
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }
      window.location.href = '/';
    }
  </script>
</body>
</html>
