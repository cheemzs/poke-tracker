<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Card Tracker — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-box">
    <div class="auth-logo">&#x1F4C7;</div>
    <h1 class="auth-title">Card Tracker</h1>
    <p class="auth-subtitle">Track your Pokémon collection in SGD</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Log in</button>
      <button class="auth-tab" onclick="showTab('register')">Register</button>
    </div>

    <div id="tab-login">
      <form onsubmit="event.preventDefault(); login()">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="Your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Your password" autocomplete="current-password" />
        </div>
        <p class="auth-error" id="login-error"></p>
        <button type="submit" class="btn-primary full-width">Log in</button>
      </form>
    </div>

    <div id="tab-register" style="display:none">
      <form onsubmit="event.preventDefault(); register()">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Choose a password" autocomplete="new-password" />
        </div>
        <p class="auth-error" id="reg-error"></p>
        <button type="submit" class="btn-primary full-width">Create account</button>
      </form>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
    }

    async function login() {
      const username = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pass').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Please fill in both fields.'; return; }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }
      window.location.href = '/';
    }

    async function register() {
      const username = document.getElementById('reg-user').value.trim();
      const password = document.getElementById('reg-pass').value;
      const errEl = document.getElementById('reg-error');
      errEl.textContent = '';
      if (!username || !password) { errEl.textContent = 'Please fill in both fields.'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }
      window.location.href = '/';
    }

  </script>
</body>
</html>
